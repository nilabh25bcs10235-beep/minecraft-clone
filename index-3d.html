<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 3D - AI Powered (Fusion)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: white; font-family: system-ui; }
        #game { display: block; }
        #ui { position: absolute; bottom: 0; left: 0; right: 0; padding: 15px; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; gap: 8px; }
        #chat-log { max-height: 120px; overflow-y: auto; font-size: 14px; margin-bottom: 8px; }
        #chat-input { width: 100%; padding: 10px; font-size: 16px; border: none; border-radius: 6px; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #fff; }
        #crosshair::before { width: 2px; height: 20px; left: 9px; }
        #crosshair::after { width: 20px; height: 2px; top: 9px; }
        .instructions { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; font-size: 14px; max-width: 280px; z-index: 5; }
        #api-key-section { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 8px; z-index: 5; }
        .ai-response { background: #1f2937; padding: 8px 12px; border-radius: 6px; margin-top: 4px; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    
    <div id="crosshair"></div>

    <div class="instructions">
        <strong>3D Minecraft + AI (Fusion)</strong><br>
        Click to lock mouse<br>
        WASD = Move &nbsp; Space = Jump<br>
        Left Click = Break &nbsp; Right Click = Place<br>
        <br>
        Type commands in chat below to use <strong>Fusion AI</strong>
    </div>

    <div id="api-key-section">
        <label style="font-size:13px; display:block; margin-bottom:4px;">OpenRouter API Key (for Fusion)</label>
        <input type="password" id="api-key" placeholder="sk-or-..." style="width:260px; padding:6px;">
        <button onclick="saveApiKey()" style="margin-left:6px; padding:6px 12px; cursor:pointer;">Save Key</button>
    </div>

    <div id="ui">
        <div id="chat-log"></div>
        <input type="text" id="chat-input" placeholder="Ask Fusion AI... (e.g. build a tower or generate trees)">
    </div>

    <script>
        // ==================== THREE.JS 3D SETUP ====================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        const groundGeo = new THREE.PlaneGeometry(80, 80);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x4ade80 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const blocks = [];
        function addBlock(x, y, z, color = 0x8B4513) {
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const mat = new THREE.MeshLambertMaterial({ color });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x + 0.5, y + 0.5, z + 0.5);
            scene.add(mesh);
            blocks.push(mesh);
            return mesh;
        }

        // Simple starting area
        for (let x = -8; x <= 8; x++) {
            for (let z = -8; z <= 8; z++) {
                addBlock(x, 0, z, 0x4ade80);
            }
        }
        for (let i = 0; i < 5; i++) {
            addBlock(4, 1, 3 + i, 0xa16207);
            addBlock(4, 2, 3 + i, 0x64748b);
        }

        camera.position.set(0, 4, 10);

        // ==================== FIRST-PERSON CONTROLS ====================
        let move = { forward: false, backward: false, left: false, right: false };
        let velocity = new THREE.Vector3();
        let yaw = 0, pitch = 0;
        let isLocked = false;
        const canvasEl = document.getElementById('game');

        canvasEl.addEventListener('click', () => canvasEl.requestPointerLock());

        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === canvasEl;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isLocked) return;
            yaw -= e.movementX * 0.0025;
            pitch -= e.movementY * 0.0025;
            pitch = Math.max(-1.4, Math.min(1.4, pitch));
        });

        document.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'w') move.forward = true;
            if (k === 's') move.backward = true;
            if (k === 'a') move.left = true;
            if (k === 'd') move.right = true;
            if (e.key === ' ') { velocity.y = 0.35; e.preventDefault(); }
        });

        document.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'w') move.forward = false;
            if (k === 's') move.backward = false;
            if (k === 'a') move.left = false;
            if (k === 'd') move.right = false;
        });

        // ==================== RAYCASTING ====================
        const raycaster = new THREE.Raycaster();
        let targetedBlock = null;

        function getTargetedBlock() {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(blocks, false);
            return intersects.length > 0 ? intersects[0] : null;
        }

        window.addEventListener('mousedown', (e) => {
            if (!isLocked) return;
            const hit = getTargetedBlock();
            if (!hit) return;

            if (e.button === 0) { // Left click - break
                scene.remove(hit.object);
                const idx = blocks.indexOf(hit.object);
                if (idx !== -1) blocks.splice(idx, 1);
            }

            if (e.button === 2) { // Right click - place
                const pos = hit.object.position.clone();
                const normal = hit.face.normal.clone();
                pos.add(normal);
                addBlock(Math.floor(pos.x), Math.floor(pos.y), Math.floor(pos.z), 0x854d0e);
            }
        });
        window.addEventListener('contextmenu', e => e.preventDefault());

        // ==================== GAME LOOP ====================
        function animate() {
            requestAnimationFrame(animate);

            const speed = 0.12;
            direction = new THREE.Vector3();
            if (move.forward) direction.z -= 1;
            if (move.backward) direction.z += 1;
            if (move.left) direction.x -= 1;
            if (move.right) direction.x += 1;
            direction.normalize();

            velocity.x = direction.x * speed;
            velocity.z = direction.z * speed;

            camera.position.x += velocity.x;
            camera.position.z += velocity.z;

            velocity.y -= 0.018;
            camera.position.y += velocity.y;
            if (camera.position.y < 2) { camera.position.y = 2; velocity.y = 0; }

            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;

            renderer.render(scene, camera);
        }

        // ==================== FUSION AI ENDPOINT ====================
        const chatLog = document.getElementById('chat-log');
        const chatInput = document.getElementById('chat-input');

        function addToChatLog(text, isAI = false) {
            const div = document.createElement('div');
            div.style.marginBottom = '6px';
            div.innerHTML = isAI 
                ? `<strong style="color:#60a5fa">Fusion:</strong> ${text}` 
                : `<strong style="color:#f59e0b">You:</strong> ${text}`;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function saveApiKey() {
            const keyInput = document.getElementById('api-key');
            if (keyInput.value.trim()) {
                localStorage.setItem('openrouter_api_key', keyInput.value.trim());
                alert('API key saved locally. Fusion is ready!');
            }
        }

        async function callFusionAI(userPrompt) {
            const apiKey = localStorage.getItem('openrouter_api_key');
            if (!apiKey) {
                alert('Please save your OpenRouter API key first (top right).');
                return;
            }

            addToChatLog(userPrompt, false);

            const thinkingDiv = document.createElement('div');
            thinkingDiv.innerHTML = `<strong style="color:#60a5fa">Fusion:</strong> <em>Thinking...</em>`;
            chatLog.appendChild(thinkingDiv);
            chatLog.scrollTop = chatLog.scrollHeight;

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': 'https://github.com/nilabh25bcs10235-beep/minecraft-clone',
                        'X-Title': 'Minecraft 3D + Fusion AI'
                    },
                    body: JSON.stringify({
                        model: 'openrouter/fusion',
                        messages: [
                            {
                                role: 'system',
                                content: 'You are a helpful AI assistant inside a 3D Minecraft-like game. The player can give you commands to build, explore, or get information. Keep responses short and actionable.'
                            },
                            {
                                role: 'user',
                                content: userPrompt
                            }
                        ],
                        max_tokens: 300
                    })
                });

                const data = await response.json();
                thinkingDiv.remove();

                if (data.choices && data.choices[0]) {
                    const aiText = data.choices[0].message.content;
                    addToChatLog(aiText, true);

                    // Future: We can parse aiText to actually build things in the world
                } else {
                    addToChatLog('Sorry, Fusion did not return a proper response.', true);
                }
            } catch (err) {
                thinkingDiv.remove();
                addToChatLog('Error calling Fusion: ' + err.message, true);
            }
        }

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && chatInput.value.trim() !== '') {
                const prompt = chatInput.value.trim();
                chatInput.value = '';
                callFusionAI(prompt);
            }
        });

        // Load saved key on start
        window.onload = () => {
            const saved = localStorage.getItem('openrouter_api_key');
            if (saved) document.getElementById('api-key').value = saved;
            animate();
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
